<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Light - Free Streaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .tab-btn:hover:not(.active) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .card-image {
            width: 100%;
            height: 280px;
            background: #ddd;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-description {
            font-size: 0.85em;
            color: #666;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .play-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .play-btn:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.1em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            color: #666;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Fly Light</h1>
            <p>Free Open Source Streaming Service</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('movies')">Movies</button>
            <button class="tab-btn" onclick="switchTab('videos')">Videos</button>
        </div>

        <div id="movies" class="content active">
            <div id="movies-container" class="loading">Loading movies...</div>
        </div>

        <div id="videos" class="content">
            <div id="videos-container" class="loading">Loading videos...</div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Hide all content
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            // Load content if not already loaded
            if (tab === 'movies' && !window.moviesLoaded) {
                loadMovies();
            } else if (tab === 'videos' && !window.videosLoaded) {
                loadVideos();
            }
        }

        function loadMovies() {
            fetch('/api/movies')
                .then(response => response.json())
                .then(movies => {
                    window.moviesLoaded = true;
                    displayItems(movies, 'movies-container');
                })
                .catch(error => {
                    console.error('Error loading movies:', error);
                    document.getElementById('movies-container').innerHTML = 
                        '<div class="error">Error loading movies. Make sure Jellyfin is configured.</div>';
                });
        }

        function loadVideos() {
            fetch('/api/videos')
                .then(response => response.json())
                .then(videos => {
                    window.videosLoaded = true;
                    displayItems(videos, 'videos-container');
                })
                .catch(error => {
                    console.error('Error loading videos:', error);
                    document.getElementById('videos-container').innerHTML = 
                        '<div class="error">Error loading videos. Make sure Jellyfin is configured.</div>';
                });
        }

        function displayItems(items, containerId) {
            const container = document.getElementById(containerId);
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty">No items found</div>';
                return;
            }

            container.innerHTML = '<div class="grid">' + 
                items.map(item => `
                    <div class="card">
                        <div class="card-image">
                            <img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">
                        </div>
                        <div class="card-content">
                            <div class="card-title">${item.name}</div>
                            <div class="card-description">${item.overview || 'No description'}</div>
                            <button class="play-btn" onclick="playItem('${item.id}')">▶ Play</button>
                        </div>
                    </div>
                `).join('') + 
            '</div>';
        }

        function playItem(itemId) {
            fetch(`/api/play/${itemId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('Error: ' + data.error);
                    } else {
                        // Open in new tab or implement custom player
                        window.open(data.url, '_blank');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error playing item');
                });
        }

        // Load movies on initial page load
        window.addEventListener('load', loadMovies);
    </script>
</body>
</html>
